name: Daily Study Summary

on:
  schedule:
    - cron: '20 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Restore auth files
        run: |
          if [ -n "${{ secrets.TOKEN_JSON }}" ]; then
            echo "${{ secrets.TOKEN_JSON }}" | base64 -d > token.json
          fi

      - name: Run study automation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WHATSAPP_API_TOKEN: ${{ secrets.WHATSAPP_API_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_RECIPIENT: ${{ secrets.WHATSAPP_RECIPIENT }}
        run: python3 main.py

      - name: Commit streak data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update streak data [skip ci]"
          file_pattern: streak.json
