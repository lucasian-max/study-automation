name: Daily Study Summary

on:
  schedule:
    - cron: '50 12 * * 4'
    - cron: '50 12 * * 5'
    - cron: '50 12 * * 6'
    - cron: '50 12 * * 7'
    - cron: '50 12 * * 8'
    - cron: '50 12 * * 9'
    - cron: '50 11 * * 10'
    - cron: '50 11 * * 11'
    - cron: '50 11 * * 12'
    - cron: '50 11 * * 1'
    - cron: '50 11 * * 2'
    - cron: '50 11 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python deps
        run: pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Install Node deps
        run: npm ci

      - name: Restore auth files
        run: |
          if [ -n "${{ secrets.TOKEN_JSON }}" ]; then
            echo "${{ secrets.TOKEN_JSON }}" | base64 -d > token.json
          fi

      - name: Run study automation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 main.py

      - name: Commit streak data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update streak data [skip ci]"
          file_pattern: streak.json
