name: Daily Study Summary

on:
  schedule:
    - cron: '20 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          pip install playwright
          playwright install firefox

      - name: Restore auth files
        run: |
          if [ -n "${{ secrets.TOKEN_JSON }}" ]; then
            echo "${{ secrets.TOKEN_JSON }}" | base64 -d > token.json
          fi
          mkdir -p whatsapp-session
          if [ -n "${{ secrets.WHATSAPP_STATE }}" ]; then
            echo "${{ secrets.WHATSAPP_STATE }}" | base64 -d > whatsapp-session/state.json
          fi

      - name: Run study automation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: xvfb-run python3 main.py

      - name: Commit streak data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update streak data [skip ci]"
          file_pattern: streak.json
